<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/giao_dien_chung.css">
    <link rel="stylesheet" href="styles/lien_he_dat_hang.css">
    <title>Document</title>
</head>

<body>
    <img style="width: 99vw;" src="Assets/images/banner/124.png" alt="">
    <div class="main_content">
        <div class="content_box">
            <div class="top_info">
                <h1><blue>Chúng tôi sẽ trả lời bạn sau 5 phút nhận được thông tin.</blue></h1>
                <p>Hãy điền vào Form liên hệ để được bộ phận chăm sóc khách hàng của Minh Khang gọi điện và tư vấn trực tiếp trong vòng 5 phút!</p>
            </div>
            <div class="lien_he">
                <form>
                    <input type="text" name="name" class="Input" id="name_input" placeholder="Họ tên" required>
                    <input type="text" name="phone_number" class="Input" id="phone_number_input" placeholder="Số điện thoại" required>
                    <textarea name="information" class="Input" id="information" placeholder="Nội dung" rows="3.5" cols="78" required></textarea>
                    <button type="submit" class="submit_btn">Liên hệ</button>
                </form>
                <div class="box">
                    <img src="Assets/icons/Logo Phuc Thinh.png" alt="">
                    <p>Giờ làm việc : 08h -> 17h30</p>
                    <p><a target="_blank" class="email">Email: ngx.thinh2011@gmail.com</a></p>
                    <p><a target="_blank" class="phone_number">Điện thoại: 0917 331 363</a></p>
                </div>
            </div>
        </div>
    </div>
    <script src="Scripts/js_chung.js"></script>
    <script src="Scripts/lien_he_dat_hang.js"></script>
</body>

</html>
